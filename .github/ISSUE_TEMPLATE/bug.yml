name: Bug
description: Report a reproducible bug or regression.
title: "[Bug]: "
labels:
  - "type: bug"
  - "stage: intake"
  - "needs: repro"
body:
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, runtime, browser, branch, or version.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or Evidence
