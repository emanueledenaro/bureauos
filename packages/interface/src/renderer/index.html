<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Opt out of browser auto-translation. Google Translate (and similar
      extensions) reparent text nodes into <font> wrappers; React then crashes
      with "Failed to execute 'insertBefore' on 'Node'" when it inserts a
      sibling (e.g. a post-action success banner) next to a node Translate moved,
      blanking the whole SPA. This is a real failure for users with auto-translate
      on, so the document declares itself non-translatable. (SER-215)
    -->
    <meta name="google" content="notranslate" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src http://127.0.0.1:* http://localhost:* ws://127.0.0.1:* ws://localhost:*;"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="data:," />
    <title>BureauOS - Operating Room</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
